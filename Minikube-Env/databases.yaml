#########################################################
# postgres1 — search shard A
#########################################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres1-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres1
spec:
  selector:
    matchLabels:
      app: postgres1
  template:
    metadata:
      labels:
        app: postgres1
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_PASSWORD
              value: "1234"
            - name: POSTGRES_DB
              value: searchlarge
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres1-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres1
spec:
  selector:
    app: postgres1
  ports:
    - port: 5432

---
