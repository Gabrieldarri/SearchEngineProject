#########################################################
# termnetdb — termnet synonym database
#########################################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: termnetdb-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: termnetdb
spec:
  selector:
    matchLabels:
      app: termnetdb
  template:
    metadata:
      labels:
        app: termnetdb
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_PASSWORD
              value: "1234"
            - name: POSTGRES_DB
              value: termnetdb
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: termnetdb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: termnetdb
spec:
  selector:
    app: termnetdb
  ports:
    - port: 5432
