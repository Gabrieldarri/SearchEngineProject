apiVersion: apps/v1
kind: Deployment
metadata:
  name: websearch
spec:
  selector:
    matchLabels:
      app: websearch
  template:
    metadata:
      labels:
        app: websearch
    spec:
      containers:
        - name: websearch
          image: websearch:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: websearch
spec:
  selector:
    app: websearch
  ports:
    - port: 80
