apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadbalancer
spec:
  selector:
    matchLabels:
      app: loadbalancer
  template:
    metadata:
      labels:
        app: loadbalancer
    spec:
      containers:
        - name: loadbalancer
          image: loadbalancer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: instances
              value: "http://searchapi1:8080;http://searchapi2:8080"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: loadbalancer
spec:
  selector:
    app: loadbalancer
  ports:
    - port: 80
